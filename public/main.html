<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
    <script src="main.js" defer></script>
</head>
<body>
<a href="/profile" style="text-decoration: none; color: inherit;">
  <div class="box">
    <h3 class="title">Profile</h3>

    <div class="box">
      <p class="subtitle">내 정보</p>
      <p class="detail" id="name">Name</p>
      <p class="detail" id="age">Age</p>
      <p class="detail">금연 시작 일자 :<span id="start-date"></span> </p>
      <p class="detail">금연 보조제 사용 여부: <span id="supplements"></span></p>
    </div>
    
    <div class="box">
      <p class="subtitle">과거 흡연 정보</p>
      <p class="detail">흡연 기간: <span id="during"></span>일</p>
      <p class="detail">소비금액: <span id="con-money"></span>원</p>
      <p class="detail">섭취한 타르양: <span id="tar"></span>mg</p>
    </div>
  </div>
</a>


</body>

</html>
